<!DOCTYPE html>
<head>
<meta charset="UTF-8">
<title>index</title>
<link rel = "stylesheet" href = "Style.css">
</head>

<body>
    <div class="borda_baixo">
        <h3 class="logo">Achei<span>.UNIRIO</span></h3>
    </div>
    <div class = "alinhamento">
        <div class="cadastro">
            <h1 class="titulo">Cadastro</h1>
            <form id="cadastrar" action="AcheiUnirio.html" >
                <label for="nome">Nome:</label>
                <br>
                <input class="botao-texto" type="text" name="nome" required> 
                <br><br>
                <label for="email">Email:</label>
                <br>
                <input class="botao-texto" type="text" name="email" placeholder="aluno@edu.unirio.br" required>
                <br><br>
                <label for="senha">Senha:</label>
                <br>
                <input class="botao-texto" type="password" name="senha" required>
                <br><br>
                <label for="Confirmar">Confirmar senha:</label>
                <br>
                <input class="botao-texto" type="password" name="confirmar" required>
                <br><br>
                <input type="submit" value="Cadastrar" class="btn-estilo" style="width: 100%;">
            </form>
            <p style="text-align: center;">Já possui cadastro?<a href="login.html"> Clique aqui!</a></p>
        </div>
    </div>
    <script src="funcoes.js"></script>
</body>
